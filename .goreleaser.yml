version: 2

builds:
  - id: ck
    binary: ck
    main: ./cmd/claude-kit
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: zip
    name_template: "claude-kit-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - project-template/**/*

brews:
  - name: claude-kit
    repository:
      owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
      name: homebrew-claude-kit
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/adrien-barret/claude-kit
    description: CLI tool for bootstrapping Claude Code projects with best-practice templates
    license: MIT
    install: |
      bin.install "ck"
      (share/"claude-kit").install "project-template"
    test: |
      system "#{bin}/ck", "version"

changelog:
  use: github-native
